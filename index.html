<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XDE130 故障解决方案查询系统</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">XDE130 市场故障问题统计 · 故障输入查询版 V2</p>
      <h1>输入故障现象，自动查解决方案</h1>
      <p class="sub">现场输入“报警、漏水、异响、挂挡无反应、发动机高温、制动压力低”等故障内容，系统会自动匹配历史案例并显示处理方法。</p>
    </div>
    <div class="hero-card">
      <span>故障记录</span>
      <strong id="totalCount">0</strong>
      <small>来自上传 Excel 文件</small>
    </div>
  </header>

  <main>
    <section class="ask-panel">
      <label for="faultInput">输入故障信息</label>
      <textarea id="faultInput" rows="4" placeholder="例如：发动机黄色报警，高温回水管漏防冻液；或者：车辆挂挡无反应，仪表报警档位手柄故障"></textarea>
      <div class="ask-actions">
        <button id="askBtn">查询解决方案</button>
        <button id="clearBtn2" class="secondary">清空</button>
      </div>
      <div class="tips">
        <button data-demo="发动机黄色报警">发动机报警</button>
        <button data-demo="左前轮异响">轮边异响</button>
        <button data-demo="漏水 防冻液 渗漏">漏水渗漏</button>
        <button data-demo="挂挡无反应 档位手柄故障">挂挡无反应</button>
        <button data-demo="制动压力低报警">制动压力低</button>
      </div>
      <p id="aiHint" class="hint"></p>
    </section>

    <section id="bestBox" class="best-box hidden"></section>

    <section class="stats" id="stats"></section>

    <section class="panel">
      <div class="searchbar">
        <input id="q" placeholder="普通搜索：报警 / 漏水 / 轴承 / 整机编号 / 地点 / 处理方法..." />
        <button id="clearBtn">清空筛选</button>
      </div>
      <div class="filters">
        <select id="systemFilter"><option value="">全部故障系统</option></select>
        <select id="warrantyFilter"><option value="">全部保内/保外</option></select>
        <select id="locationFilter"><option value="">全部工作地点</option></select>
        <select id="tagFilter"><option value="">全部常见标签</option></select>
      </div>
      <div class="actions">
        <button id="exportBtn">导出当前结果 CSV</button>
        <span id="resultInfo"></span>
      </div>
    </section>

    <section class="layout">
      <aside class="panel side">
        <h2>常见故障 Top 20</h2>
        <div id="topTags"></div>
        <h2>故障系统占比</h2>
        <div id="systemBars"></div>
      </aside>
      <section class="results" id="results"></section>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <div class="card-head">
        <div>
          <span class="badge system"></span>
          <span class="badge warranty"></span>
          <span class="badge score"></span>
        </div>
        <button class="copyBtn">复制方案</button>
      </div>
      <h3 class="fault"></h3>
      <div class="meta"></div>
      <div class="solutionBox">
        <b>处理方法 / 解决方案</b>
        <p class="solution"></p>
      </div>
      <div class="tags"></div>
    </article>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
