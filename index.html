<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XDE130 故障信息查询系统</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">XDE130 市场故障问题统计 · 本地查询版</p>
      <h1>故障信息与解决方案查询系统</h1>
      <p class="sub">支持按故障关键词、整机编号、工作地点、故障系统、保内/保外快速筛选，适合手机、电脑和现场服务使用。</p>
    </div>
    <div class="hero-card">
      <span>故障记录</span>
      <strong id="totalCount">0</strong>
      <small>来自上传 Excel 文件</small>
    </div>
  </header>

  <main>
    <section class="stats" id="stats"></section>

    <section class="panel">
      <div class="searchbar">
        <input id="q" placeholder="输入：报警 / 漏水 / 轴承 / 整机编号 / 地点 / 处理方法..." />
        <button id="clearBtn">清空</button>
      </div>
      <div class="filters">
        <select id="systemFilter"><option value="">全部故障系统</option></select>
        <select id="warrantyFilter"><option value="">全部保内/保外</option></select>
        <select id="locationFilter"><option value="">全部工作地点</option></select>
        <select id="tagFilter"><option value="">全部常见标签</option></select>
      </div>
      <div class="actions">
        <button id="exportBtn">导出当前结果 CSV</button>
        <span id="resultInfo"></span>
      </div>
    </section>

    <section class="layout">
      <aside class="panel side">
        <h2>常见故障 Top 20</h2>
        <div id="topTags"></div>
        <h2>故障系统占比</h2>
        <div id="systemBars"></div>
      </aside>
      <section class="results" id="results"></section>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <div class="card-head">
        <div>
          <span class="badge system"></span>
          <span class="badge warranty"></span>
        </div>
        <button class="copyBtn">复制方案</button>
      </div>
      <h3 class="fault"></h3>
      <div class="meta"></div>
      <div class="solutionBox">
        <b>处理方法 / 解决方案</b>
        <p class="solution"></p>
      </div>
      <div class="tags"></div>
    </article>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
